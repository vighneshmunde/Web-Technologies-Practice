<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(194, 196,198);
        }

        .frame{
            width: 250px;
            height: 400px;
            border: 8px solid brown;
            perspective: 1000px;
        }

        .door{
            width: 100%;
            height: 100%;
            background-color: rgb(166, 89, 12);
            transition: 2s;
            transform-origin: left;
        }

        .frame:hover .door{
            transform: rotateY(-150deg);
        }

        .handle{
            height: 20px;
            width: 20px;
            background-color: blanchedalmond;
            border-radius: 100%;
            position: absolute;
            top: 50%;
            right: 15px;
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="door">
            <div class="handle"></div>
        </div>
    </div>
</body>
</html>
