<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;    
        }

        .parent{
            height: 80px;
            width: 400px;
            border: 1px solid;
            background-color: yellow;
            border-radius: 50px;
        }

        .child{
            height: 100%;
            width: 120px;
            border-radius: 50px;
            background-color: blue;
            transition-property: all;
            transition-duration: 2s;
            transition-delay: 1s;
            transition-timing-function: ease;
        }

        .child:hover{
            transform: translateX(280px);
            background-color:dodgerblue;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
</body>
</html>
