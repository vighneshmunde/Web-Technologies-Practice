<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        .parent{
            height: 400px;
            width: 400px;
            /* border: 1px solid; */
            position: relative;
        }

        .sun{
            height: 100%;
            width: 100%;
            border-radius: 100%;
            border: 1px solid;
            background-image: url(https://tse3.mm.bing.net/th/id/OIP.6EZVwwsY4We_CL_UiaHUaAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3);
            background-repeat: no-repeat;
            background-size: cover;
            position: absolute;
        }
        
        .moon{
            height: 100%;
            width: 100%;
            border-radius: 100%;
            background-color: black;
            position: absolute;
            transition-property: all;
            transition-duration: 4s;
            transition-delay: 1s;
            transition-timing-function: ease;
        }

        .moon:hover{
            transform: translateX(700px);
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="sun"></div>
        <div class="moon"></div>
    </div>
</body>
</html>
