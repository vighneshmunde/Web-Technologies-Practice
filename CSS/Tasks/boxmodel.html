<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .form{
            height: 300px;
            width: 300px;
            border: 1px solid;
            margin: 130px auto;
            padding: 20px;
        }

        h2{
            text-align: center;
            font-size: 32px;
            color:orangered
        }

        input{
            width: 90%;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
        }

        ::placeholder{
            font-size: 20px;
            color: blue;
        }

        button{
            padding: 10px;
            margin-top: 30px;
            background-color: yellow;
            font-weight: 500;
            font-size: 25px;
            border-radius: 10px;
        }


    </style>
</head>
<body>
    <div class="form">
        <h2>Login Form</h2>
        <input type="text" placeholder="Enter Username">
        <input type="password" placeholder="Enter Password">
        <button>Login</button>
    </div>
    
</body>
</html>
