<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent {
            height: 600px;
            width: 400px;
            /* border: 2px solid; */
            perspective: 1000px;
            display: flex;
            position: relative;
            background-color: cornsilk;
        }

        .child {
            width: 100%;
            height: 100%;
            background-color: cornsilk;
            transition: 2s;
            transform-origin: left;
            position: absolute;
            overflow: hidden;
        }

        .parent:hover .child {
            transform: rotateY(-180deg);
        }

        #happy {
            font-size: 40px;
            font-weight: 500;
            text-transform: uppercase;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 12px;
            margin-top: -160px;
            text-align: center;
            color: midnightblue;
        }

        #birthday {
            font-size: 80px;
            font-weight: 200;
            font-style: italic;
            text-align: center;
            color: crimson;
        }

        #birthday::first-letter {
            font-size: 100px;
        }

        .front_paragraph {
            margin-top: 20px;
            color: darkblue;
            font-size: 24px;
            text-align: center;
        }


        #giftbox {
            height: 200px;
            width: auto;
            margin-left: 225px;
            margin-top: -24px;

        }

        #balloon {
            height: 350px;
            width: auto;
            margin-left: -250px;
            position: static;


        }

        span {
            color: crimson;
            font-weight: 500;
        }

        #Happy {
            font-size: 80px;
            font-weight: 500;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            color: midnightblue;
            margin-top: 40px;
            margin-left: 80px;
        }

        #Birthday {
            font-size: 80px;
            font-weight: 200;
            color: rgb(193, 65, 86);
            margin-top: 140px;
            margin-left: -240px;
            text-align: center;
        }

        .innertext {
            margin-top: 260px;
            margin-left: -300px;
            margin-right: 30px;
            text-align: center;
            color: darkblue;
            font-size: 24px;
        }

        #p2 {
            color: crimson;
            margin-top: 20px;
        }

        #p3 {
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="parent">
        <h1></h1>
        <div class="child">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/053/292/819/small_2x/fun-colorful-party-balloons-for-celebrations-free-png.png"
                alt="balloon" id="balloon">
            <h1 id="happy">Happy</h1>
            <h1 id="birthday">Birthday</h1>

            <div class="front_paragraph">
                <p> Wishing you a day </p>
                <p>filled with <span class="span"> joy, laughter </span></p>
                <p>and <span class="span"> wonderful </span> memories</p>
            </div>

            <img src="https://static.vecteezy.com/system/resources/previews/035/994/979/original/ai-generated-birthday-gift-box-free-png.png"
                alt="Image Not Found" id="giftbox">


        </div>
        <h1 id="Happy">Happy</h1>
        <h1 id="Birthday">Birthday</h1>
        <div class="innertext">
            <p>Wishing you a day filled with</p>
            <p>love, laughter and all the things </p>
            <p> that make you happiest</p>

            <p id="p2">May this year bring you joy, success, and beautiful memories!</p>

            <p id="p3"> Enjoy your special day!</p>
        </div>

    </div>
</body>

</html>
