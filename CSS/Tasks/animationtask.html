<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .sky{
            height: 100vh;
            width: 100%;
            background-color: lightblue;
            position: relative;
            animation: skyChange 6s infinite;
        }

        .sun{
            height: 100px;
            width: 100px;
            background-color: yellow;
            border-radius: 100%;
            box-shadow: 0px 0px 80px yellow;
            position: absolute;
            top: 60%;
            left:10%;
            animation: sunMove 6s infinite;
        }

        .moon{
            height: 80px;
            width: 80px;
            background-color: white;
            border-radius: 100%;
            box-shadow: 1px 1px 80px whitesmoke;
            position: absolute;
            top: 80px;
            right: 80px;
            animation: moonTwinkle 6s infinite;
        }

        .stars{
            height: 8px;
            width: 8px;
            background-color: white;
            border-radius: 100%;
            box-shadow: 1px 1px 180px whitesmoke;
            position: absolute;
            animation: starTwinkle 6s infinite;
        }

        .star1{
            top: 20%;
            left: 20%;
        }

        .star2{
            top: 10%;
            left: 40%;
        }

        .star3{
            top: 30%;
            left: 50%;
        }

        .star4{
            top: 10%;
            left: 60%;
        }

        .star5{
            top: 20%;
            left: 80%;
        }

        @keyframes sunMove {
            0%{
                top: 60%;
                left:10%;
            }

            50%{
                top: 10%;
                left: 50%;
            }

             100%{
                top: 60%;
                left:100%;
            }
        }

        @keyframes moonTwinkle {
            0%,50%{
                opacity: 0;
            }

            51%,100%{
                opacity: 1;
            }
        }

        @keyframes starTwinkle {
            0%,50%{
                opacity: 0;
            }

            51%,100%{
                opacity: 1;
            }
        }

        @keyframes skyChange {
            0%,50%{
                background-color: lightblue;
            }

            51%,100%{
                background-color: black;
            }
        }
    </style>
</head>
<body>
    <div class="sky">
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="stars star1"></div>
    <div class="stars star2"></div>
    <div class="stars star3"></div>
    <div class="stars star4"></div>
    <div class="stars star5"></div>
    </div>
</body>
</html>
