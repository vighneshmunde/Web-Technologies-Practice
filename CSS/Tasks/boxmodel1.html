<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        }

            width: 600px;

        }

        .box1{
            height: 100px;

            border-radius: 50%;
            margin: 50px auto;
        }

                    </div>

            </div>
