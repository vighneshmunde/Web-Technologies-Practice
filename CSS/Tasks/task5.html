<!DOCTYPE html>

        .parent{
            height: 600px;
            width: 1300px;

        }

        .child{

        }

        button{

            height: 36px;
            width: auto;
            font-size: 18px;
            background-color:crimson;
            color: whitesmoke;
            border-radius: 8px;
        }

        img{
           height: 100%;
           width: 100%;
            border-radius: 5%;
           
        }

        strike{
            color:red;
        }
