<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 160px;
            animation: animal 5s 1s infinite;
        }

        #ease{
            animation-timing-function: ease;
        }
        #linear{
            animation-timing-function: linear;
        }
        #ease-in{
            animation-timing-function: ease-in;
        }

        #ease-out{
            animation-timing-function: ease-out;
        }
    
       @keyframes animal{

        0%{
            transform: translateX(0px);
        }

        100%{
            transform: translateX(1200px);
        } 

         }

        
    </style>
</head>
<body>
    <fieldset> 
        <legend>ease</legend>
        <img src="https://i.pinimg.com/originals/b8/29/9b/b8299bfa4a8092ab93c08a5db0359a23.gif" id="ease" alt=" gif not found">
    </fieldset>
    <fieldset> 
        <legend>linear</legend>
        <img src="https://i.pinimg.com/originals/b8/29/9b/b8299bfa4a8092ab93c08a5db0359a23.gif" id="linear" alt="gif not found">
    </fieldset>
    <fieldset> 
        <legend>ease-in</legend>
        <img src="https://i.pinimg.com/originals/b8/29/9b/b8299bfa4a8092ab93c08a5db0359a23.gif" id="ease-in" alt="gif not found">
    </fieldset>
    <fieldset> 
        <legend>ease-out</legend>
        <img src="https://i.pinimg.com/originals/b8/29/9b/b8299bfa4a8092ab93c08a5db0359a23.gif" id="ease-out" alt="gif not found">
    </fieldset>
</body>
</html>
