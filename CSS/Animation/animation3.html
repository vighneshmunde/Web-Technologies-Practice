<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(240, 240,240);
        }

        .spinner{
            height: 100px;
            width: 100px;
            border: 10px solid rgb(200, 200, 200);
            border-top: 10px solid crimson;
            border-radius: 100%;
            animation: spin 3s 1s linear infinite;
        }

        @keyframes spin{
            0%{
                transform: rotate(0deg);
            }

            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
</body>
</html>
