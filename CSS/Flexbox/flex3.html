<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        .parent{
            height: 700px;
            width: 700px;
            border: 1px solid;
            margin: 0px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .child1{
            height: 400px;
            width: 300px;
            border: 1px solid;
            margin-top: 20px;
        }

        .child2{
            height: 300px;
            width: 100%;
            /* border: 1px solid; */
            display: flex;
            align-items: center;
            justify-content: space-evenly;

        }

        .box{
            height: 120px;
            width: 120px;
            border: 1px solid;
        }

    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
    
</body>
</html>
