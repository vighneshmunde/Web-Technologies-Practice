<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>
            Student Data
        </legend>

        <form>

            <label for="name"> Company Name:</label>
            <input type="text" id="name" placeholder="Qspiders" readonly><br><br>


            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name"><br><br>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email " required><br><br>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter the password" minlength="8" pattern=(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&])> <br><br>

            <label for="contact">Contact</label>
            <input type="tel" id="contact" placeholder="Enter your contact number" minlength="10" maxlength="10"><br><br>

            <label for="address">Address</label>
            <textarea name="address" id="address" placeholder="Enter your address"></textarea><br><br>

            <label for="age">Age</label>
            <input type="number" id="age" min="18" max="60"><br><br>

            <label for="gender">Gender</label>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other">
            <label for="other">Other</label><br><br>

            <label for="skills">Skills</label>
            <input type="checkbox">Html
            <input type="checkbox">CSS
            <input type="checkbox">JavaScript<br><br>

            <label for="DOB">Date of Birth</label>
            <input type="date" id="DOB"min="2000-01-01" max="2025-12-31"><br><br>

            <label for="degree">Degree</label>
            <select name="" id="degree">
                <option value="" hidden>Select Course</option>
                <option value="B.Tech">B.Tech</option>
                <option value="BE">BE</option>
                <option value="BSC">BSC</option>
            </select><br><br>


            <label for="resume">Resume</label>
            <input type="file" id="resume"><br><br>


            <button>Submit</button>
        </form>
    </fieldset>
</body>
</html>
